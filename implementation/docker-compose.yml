version: '3.9'

services:

  # ── PostgreSQL local (alternativa a Supabase en desarrollo) ──────────────
  postgres:
    image: postgres:16-alpine
    container_name: factuplus_db
    environment:
      POSTGRES_DB:       factuplus
      POSTGRES_USER:     factuplus_user
      POSTGRES_PASSWORD: factuplus_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/seed_data.sql:/docker-entrypoint-initdb.d/02_seeds.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factuplus_user -d factuplus"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factuplus_backend
    environment:
      DATABASE_URL: postgresql://factuplus_user:factuplus_pass@postgres:5432/factuplus
      SECRET_KEY: change-me-in-production-32-chars-min
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: factuplus_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata: